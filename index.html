<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Avaliação</title>
    <link rel="icon" href="img.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header> <h2>CADASTRO DE USUÁRIO</h2> </header>
    <hr>
    <br>
    <div class="container">
        <form action="#" name="formularioavaliadora">
            <br>
            <br>
            <label>Nome Completo:</label>
            <br>
            <input type="text" id="nome" placeholder="Digite...">
            <br>
            <br>
            <label>Data de nascimento:</label>
            <br>
            <input type="date" id="data">
            <br>
            <br>
            <label>Sexo:</label>
            <br>
            <select id="select">
                <option value="1">Selecione</option>
                <option value="2">Feminino</option>
                <option value="3">Masculino</option>
                <option value="4">Outro</option>
            </select>
            <br>
            <br>
            <label>Nome Materno:</label>
            <br>
            <input type="text" id="nomeMaterno" placeholder="Digite...">
            <br>
            <br>
            <label>CPF:</label>
            <br>
            <input type="text" id="cpf" placeholder="000.000.000-00" oninput="mascaraCPF(this)" maxlength="14">
            <br>
            <br>
            <button type="submit" id="botao" onclick="validarFormulario(event)">
                CONTINUAR
            </button>
        </form>
        
        <div class="meio-circulo">
            <img src="img.png" alt="desenho de mulher mexendo no computador">
        </div>
    </div>
    <br>
    <br>
    <footer>
        <div>
            <h3 class="integrantes">Integrantes</h3>
            <ul class="lista">
                <li class="nome">Design UX/UI: Anônimo</li>
                <li class="nome">Analista e Desenvolvedora de Sistema: Alessandra Cristina da Silva Pereira</li>
            </ul>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
